name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: JS syntax (app + patterns + service worker)
        run: |
          node --check app.js
          node --check patterns.js
          node --check sw.js

      - name: Install npm devDependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E
        run: npm run test:e2e
        env:
          CI: 'true'
